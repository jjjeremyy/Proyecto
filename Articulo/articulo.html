<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS crítico inline (evita render-blocking) -->
  <style>
    /* Solo los estilos del above-the-fold: header, título, spinner */
    body{margin:0;font-family:system-ui,sans-serif;background:#f5f3ee}
    .article-title{font-size:clamp(1.7rem,3.5vw,2.4rem);font-weight:700}
    /* ... mínimos estilos críticos ... */
  </style>

  <!-- CSS no-crítico: carga diferida -->
  <link rel="preload" href="../GuiaEstilosCSS/style.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="../GuiaEstilosCSS/style.css"></noscript>

  <!-- Fonts: solo los pesos realmente usados -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Source+Sans+3:wght@400;600&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">

  <!-- Preload de la imagen de portada (solo si es above-the-fold) -->
  <link id="preload-img" rel="preload" as="image"
        href="" <!-- Se inyecta via JS con el slug del artículo -->
        imagesrcset="foto-400.webp 400w, foto-800.webp 800w">

  <!-- JS del artículo: defer = no bloquea el parser -->
  <script type="module" src="articulo.js" defer></script>

  <!-- NO cargar AdSense aquí — cargarlo solo tras consentimiento cookies -->
  <!-- <script async src="pagead2.googlesyndication..."></script> ← MOVER a JS -->

  <!-- SEO + Open Graph -->
  <meta name="description" content="" id="meta-desc">
  <meta property="og:type" content="article">
  <meta property="og:image" content="" id="og-img">
  <link rel="canonical" href="" id="canonical">
</head>
