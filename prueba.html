<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SistemaBase — Diagnóstico</title>
    <style>
        body { font-family: monospace; padding: 30px; background: #0d1b33; color: #a8d4ff; }
        h1 { color: #fff; }
        .ok   { color: #4ade80; }
        .err  { color: #f87171; }
        .warn { color: #fbbf24; }
        .info { color: #60a5fa; }
        pre { background: #091525; padding: 16px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; }
        button { background: #2165b3; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 8px 4px; }
        button:hover { background: #043873; }
        #log { margin-top: 20px; }
        .entry { margin: 6px 0; padding: 8px 12px; border-radius: 4px; background: #091525; }
    </style>
</head>
<body>
<h1>🔬 Diagnóstico SistemaBase</h1>
<p class="warn">Pon este archivo en la raíz del proyecto (junto a index.html) y ábrelo con Live Server.</p>

<button onclick="limpiarCache()">🗑 Limpiar caché localStorage</button>
<button onclick="ejecutarDiagnostico()">▶ Ejecutar diagnóstico</button>

<div id="log"></div>

<script type="module">
    // ── importar directamente desde Supabase CDN (sin cache.js) ──
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const URL_SB  = 'https://xylvokwwiiirjlcjrafb.supabase.co';
    const KEY_SB  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5bHZva3d3aWlpcmpsY2pyYWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQ2NTksImV4cCI6MjA4OTE3MDY1OX0.M__8j6m_9glJEoXHvxdG9gXtQ2fE_Fa8yWbBSl-GoS8';

    const sb = createClient(URL_SB, KEY_SB);

    function log(msg, tipo = 'info') {
        const div = document.createElement('div');
        div.className = `entry ${tipo}`;
        div.innerHTML = msg;
        document.getElementById('log').appendChild(div);
        console.log(msg);
    }

    window.limpiarCache = function() {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith('sb_cache_')) keys.push(k);
        }
        keys.forEach(k => localStorage.removeItem(k));
        log(`✅ Caché limpiado — ${keys.length} claves eliminadas: ${keys.join(', ') || 'ninguna'}`, 'ok');
    };

    window.ejecutarDiagnostico = async function() {
        document.getElementById('log').innerHTML = '';
        log('🚀 Iniciando diagnóstico...', 'info');

        // TEST 1: Conexión básica
        log('<strong>TEST 1: Conexión a Supabase</strong>', 'info');
        try {
            const { data, error } = await sb.from('articulos').select('count', { count: 'exact', head: true });
            if (error) {
                log(`❌ Error de conexión: ${JSON.stringify(error)}`, 'err');
            } else {
                log(`✅ Conexión OK`, 'ok');
            }
        } catch(e) {
            log(`❌ Excepción: ${e.message}`, 'err');
        }

        // TEST 2: Todos los artículos SIN filtro
        log('<strong>TEST 2: Artículos sin filtro de estado</strong>', 'info');
        try {
            const { data, error } = await sb
                .from('articulos')
                .select('id, titulo, estado, fecha_publicacion')
                .order('fecha_publicacion', { ascending: false })
                .limit(10);

            if (error) {
                log(`❌ Error: ${JSON.stringify(error)}`, 'err');
            } else if (!data || data.length === 0) {
                log(`⚠️ La tabla "articulos" está vacía o RLS bloquea el acceso anónimo`, 'warn');
            } else {
                log(`✅ ${data.length} artículo(s) encontrados sin filtro`, 'ok');
                data.forEach(a => {
                    const tipo = typeof a.estado;
                    log(`&nbsp;&nbsp;→ id=${a.id} | estado=${JSON.stringify(a.estado)} (tipo: <strong>${tipo}</strong>) | titulo="${a.titulo}"`, 'info');
                });
            }
        } catch(e) {
            log(`❌ Excepción: ${e.message}`, 'err');
        }

        // TEST 3: Filtro con boolean true
        log('<strong>TEST 3: Filtro .eq("estado", true) — boolean</strong>', 'info');
        try {
            const { data, error } = await sb
                .from('articulos')
                .select('id, titulo, estado')
                .eq('estado', true)
                .limit(5);

            if (error) {
                log(`❌ Error: ${JSON.stringify(error)}`, 'err');
            } else {
                log(`${data?.length > 0 ? '✅' : '⚠️'} Resultados con boolean true: ${data?.length ?? 0}`, data?.length > 0 ? 'ok' : 'warn');
            }
        } catch(e) {
            log(`❌ Excepción: ${e.message}`, 'err');
        }

        // TEST 4: Filtro con string 'true'
        log('<strong>TEST 4: Filtro .eq("estado", "true") — string</strong>', 'info');
        try {
            const { data, error } = await sb
                .from('articulos')
                .select('id, titulo, estado')
                .eq('estado', 'true')
                .limit(5);

            if (error) {
                log(`❌ Error: ${JSON.stringify(error)}`, 'err');
            } else {
                log(`${data?.length > 0 ? '✅' : '⚠️'} Resultados con string "true": ${data?.length ?? 0}`, data?.length > 0 ? 'ok' : 'warn');
            }
        } catch(e) {
            log(`❌ Excepción: ${e.message}`, 'err');
        }

        // TEST 5: RLS — política anónima
        log('<strong>TEST 5: RLS (Row Level Security)</strong>', 'info');
        try {
            const { data, error, count } = await sb
                .from('articulos')
                .select('id', { count: 'exact' });

            if (error) {
                log(`❌ RLS posiblemente bloqueando: ${JSON.stringify(error)}`, 'err');
                log(`⚠️ Ve a Supabase → Authentication → Policies → tabla "articulos" y añade una política SELECT para anon`, 'warn');
            } else {
                log(`✅ RLS permite lectura anónima — ${data?.length} filas visibles`, 'ok');
            }
        } catch(e) {
            log(`❌ Excepción: ${e.message}`, 'err');
        }

        // TEST 6: Query completa como la de home.js
        log('<strong>TEST 6: Query exacta de obtenerArticulosRecientes()</strong>', 'info');
        try {
            const { data, error } = await sb
                .from('articulos')
                .select('titulo, slug, imagen_portada, descripcion, fecha_publicacion, categorias(nombre)')
                .eq('estado', true)
                .order('fecha_publicacion', { ascending: false })
                .limit(4);

            if (error) {
                log(`❌ Error: ${JSON.stringify(error)}`, 'err');
            } else if (!data || data.length === 0) {
                log(`⚠️ La query devuelve 0 resultados. Revisa el estado y las políticas RLS.`, 'warn');
            } else {
                log(`✅ Query OK — ${data.length} artículo(s) devueltos`, 'ok');
                data.forEach(a => log(`&nbsp;&nbsp;→ "${a.titulo}" | categoría: ${a.categorias?.nombre ?? 'null'}`, 'ok'));
            }
        } catch(e) {
            log(`❌ Excepción: ${e.message}`, 'err');
        }

        log('🏁 Diagnóstico completado.', 'info');
    };
</script>
</body>
</html>
