<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SistemaBase | Admin</title>
    <link rel="stylesheet" href="/admin/admin.css">
    <link rel="stylesheet" href="/admin/admin_imagen_extra.css"> 

    <!-- Quill.js — editor WYSIWYG 100% gratuito, sin registro ni API key -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>
<body>

    <div class="admin-wrapper">

        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <img src="/IMG/LogoSistemaBaseBlanco.png" alt="Logo" class="admin-logo">
                <span>SistemaBase</span>
            </div>
            <nav class="admin-nav">
                <a href="#" class="admin-nav-link active">✏️ Nuevo artículo</a>
                <a href="/index.html" class="admin-nav-link">🌐 Ver web</a>
            </nav>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="admin-main">

            <div class="admin-topbar">
                <h1>Nuevo Artículo</h1>
                <div class="admin-topbar-actions">
                    <button type="button" id="btn-preview" class="btn-secondary">👁 Previsualizar</button>
                    <button type="button" id="btn-submit"  class="btn-primary">🚀 Publicar</button>
                </div>
            </div>

            <!-- MENSAJE DE ESTADO -->
            <div id="status-message" class="status-message hidden"></div>

            <form id="formulario-articulo" novalidate>
                <div class="admin-grid">

                    <!-- COLUMNA PRINCIPAL -->
                    <div class="admin-col-main">

                        <div class="field-group">
                            <label for="titulo">Título <span class="required">*</span></label>
                            <input type="text" id="titulo" placeholder="Escribe el título aquí..." required>
                        </div>

                        <div class="field-group">
                            <label for="descripcion">Descripción breve</label>
                            <input type="text" id="descripcion" placeholder="Resumen corto del artículo...">
                        </div>

                        <div class="field-group">
                            <label>Contenido <span class="required">*</span></label>
                            <!-- Quill se monta aquí -->
                            <div id="quill-editor"></div>
                            <!-- Campo oculto donde guardamos el HTML generado por Quill -->
                            <input type="hidden" id="contenido">
                        </div>

                    </div>

                    <!-- COLUMNA LATERAL -->
                    <div class="admin-col-side">

                        <div class="admin-card">
                            <h3 class="admin-card-title">📋 Publicación</h3>

                            <div class="field-group">
                                <label for="estado">Estado</label>
                                <select id="estado">
                                    <option value="true">✅ Publicado</option>
                                    <option value="false">📝 Borrador</option>
                                </select>
                            </div>

                            <div class="field-group">
                                <label for="categoria_id">Categoría <span class="required">*</span></label>
                                <select id="categoria_id" required>
                                    <option value="">Selecciona categoría...</option>
                                </select>
                            </div>

                            <div class="field-group">
                                <label for="slug">URL del artículo <span class="required">*</span></label>
                                <div class="slug-wrapper">
                                    <span class="slug-prefix">/articulo/?slug=</span>
                                    <input type="text" id="slug" placeholder="url-del-articulo" required>
                                </div>
                                <small>Se genera automáticamente desde el título.</small>
                            </div>
                        </div>

                        <div class="admin-card">
                            <h3 class="admin-card-title">🖼 Imagen de portada</h3>

                            <!-- Pestañas para elegir método -->
                            <div class="img-tabs">
                                <button type="button" class="img-tab active" data-tab="upload">📁 Subir archivo</button>
                                <button type="button" class="img-tab" data-tab="url">🔗 URL externa</button>
                            </div>

                            <!-- Panel: subir desde ordenador -->
                            <div class="img-tab-panel" id="panel-upload">
                                <div class="field-group">
                                    <label for="imagen_archivo">Selecciona imagen</label>
                                    <div class="file-drop-area" id="file-drop-area">
                                        <input type="file" id="imagen_archivo" accept="image/*" class="file-input">
                                        <div class="file-drop-label">
                                            <span class="file-drop-icon">🖼</span>
                                            <span class="file-drop-text">Arrastra una imagen aquí<br><small>o haz clic para seleccionar</small></span>
                                        </div>
                                    </div>
                                    <small id="file-name-display"></small>
                                </div>
                            </div>

                            <!-- Panel: URL externa -->
                            <div class="img-tab-panel hidden" id="panel-url">
                                <div class="field-group">
                                    <label for="imagen_portada">URL de la imagen</label>
                                    <input type="url" id="imagen_portada" placeholder="https://...">
                                </div>
                            </div>

                            <!-- Vista previa compartida -->
                            <div id="img-preview-box" class="img-preview-box hidden">
                                <img id="img-preview" src="" alt="Vista previa">
                                <button type="button" id="btn-remove-img" class="btn-remove-img">✕ Quitar imagen</button>
                            </div>
                        </div>

                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- MODAL DE PREVISUALIZACIÓN -->
    <div id="preview-modal" class="modal hidden">
        <div class="modal-overlay" id="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Vista previa</h2>
                <button id="close-preview" class="modal-close">✕</button>
            </div>
            <div class="modal-body" id="preview-body"></div>
        </div>
    </div>

    <script type="module" src="/admin/admin.js"></script>
</body>
</html>
