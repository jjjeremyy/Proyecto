<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SistemaBase | Acceso Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Login/login.css">
</head>
<body>

    <div class="login-page">

        <!-- PANEL IZQUIERDO: decorativo -->
        <div class="login-left">
            <div class="login-left-inner">
                <div class="brand">
                    <img src="IMG/LogoSistemaBaseBlanco.png" alt="Logo SistemaBase" class="brand-logo">
                    <span class="brand-name">SistemaBase</span>
                </div>
                <div class="login-left-text">
                    <h2>Panel de administración</h2>
                    <p>Acceso restringido. Solo personal autorizado.</p>
                </div>
                <div class="login-decoration">
                    <div class="deco-circle deco-1"></div>
                    <div class="deco-circle deco-2"></div>
                    <div class="deco-circle deco-3"></div>
                </div>
            </div>
        </div>

        <!-- PANEL DERECHO: formulario -->
        <div class="login-right">
            <div class="login-box">

                <div class="login-header">
                    <h1>Iniciar sesión</h1>
                    <p>Introduce tus credenciales para continuar</p>
                </div>

                <!-- MENSAJE DE ERROR -->
                <div id="login-error" class="login-error hidden">
                    <span id="login-error-msg"></span>
                </div>

                <form id="login-form" novalidate>

                    <div class="field-group">
                        <label for="email">Correo electrónico</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✉</span>
                            <input
                                type="email"
                                id="email"
                                placeholder="tu@email.com"
                                autocomplete="email"
                                required
                            >
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input
                                type="password"
                                id="password"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" id="toggle-password" class="toggle-pw" title="Mostrar contraseña">👁</button>
                        </div>
                    </div>

                    <button type="submit" id="btn-login" class="btn-login">
                        <span id="btn-text">Entrar al panel</span>
                        <span id="btn-loader" class="hidden">Verificando...</span>
                    </button>

                </form>

                <a href="index.html" class="back-link">← Volver a la web</a>

            </div>
        </div>

    </div>

    <script type="module" src="Login/login.js"></script>
</body>
</html>
